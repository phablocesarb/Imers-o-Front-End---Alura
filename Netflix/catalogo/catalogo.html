<!DOCTYPE html>
<html lang="pt-br">
<!-- Documento HTML5 em português brasileiro -->

<head>
    <!-- Seção de metadados e configurações -->
    <meta charset="UTF-8"> <!-- Codificação UTF-8 para suportar acentuação -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Configuração responsiva -->
    <title>Netflix - Catálogo</title> <!-- Título da página -->
    <link rel="stylesheet" href="../style.css"> <!-- Importa o CSS externo (na pasta pai) -->
</head>

<body>
    <!-- Corpo da página com todo conteúdo visível -->
    <header class="header">
        <!-- Cabeçalho com botão de tema e voltar -->
        <button id="theme-toggle" class="theme-toggle" aria-label="Alternar modo escuro/claro">
            <!-- Botão para alternar entre dark e light mode -->
            <span class="theme-icon">🌙</span>
            <!-- Ícone padrão para dark mode -->
        </button>

        <a href="../index.html" class="btn-voltar" aria-label="Voltar para seleção de perfis">
            <!-- Link para voltar à página inicial -->
            ← Voltar
        </a>
    </header>

    <main>
        <!-- Seção principal de conteúdo -->
        <section class="perfil-ativo-section" aria-label="Perfil ativo">
            <!-- Container para exibir o perfil ativo -->
            <div id="perfil-ativo"></div>
        </section>

        <!-- Seção do catálogo de conteúdo -->
        <section class="catalogo" aria-label="Catálogo de conteúdo">
            <!-- Agrupa o conteúdo do catálogo -->
            <h2>Conteúdo Disponível</h2> <!-- Título da seção -->
            
            <div class="catalogo-container">
                <!-- Container para os itens do catálogo -->
                <p class="mensagem-desenvolvimento">
                    🚀 Catálogo em desenvolvimento...
                </p>
                <!-- Mensagem temporária enquanto o catálogo é desenvolvido -->
            </div>
        </section>
    </main>

    <!-- Script JavaScript para funcionalidade de tema e perfil ativo -->
    <!-- Caminho para o arquivo catalogo.js na pasta js (na pasta pai) -->
    <!-- defer: faz o script carregar após o HTML ser completamente carregado, melhorando performance -->
    <script src="../js/catalogo.js" defer></script>
</body>

</html>
