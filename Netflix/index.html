<!DOCTYPE html>
<html lang="pt-br">
<!-- Documento HTML5 em português brasileiro -->

<head>
    <!-- Seção de metadados e configurações -->
    <meta charset="UTF-8"> <!-- Codificação UTF-8 para suportar acentuação -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Configuração responsiva -->
    <title>Netflix</title> <!-- Título da página -->
    <link rel="stylesheet" href="style.css"> <!-- Importa o CSS externo -->
</head>

<body>
    <!-- Corpo da página com todo conteúdo visível -->
    <header class="header">
        <!-- Cabeçalho com botão de tema -->
        <button id="theme-toggle" class="theme-toggle" aria-label="Alternar modo escuro/claro">
            <!-- Botão para alternar entre dark e light mode -->
            <span class="theme-icon">🌙</span>
            <!-- Ícone padrão para dark mode -->
        </button>
    </header>

    <main>
        <!-- Seção principal de conteúdo -->
        <h1>Quem está assistindo?</h1> <!-- Título em nível 1 -->
        
        <section class="profiles" aria-label="Seleção de perfis">
            <!-- Agrupa os perfis com label acessível -->
            <ul class="profiles-list">
                <!-- Lista não ordenada principal dos perfis -->
                
                <li>
                    <!-- Item 1: Túlio -->
                    <figure class="profile"> <!-- Agrupa imagem e legenda -->
                        <a href="/Netflix/catalogo/catalogo.html" aria-label="Acessar perfil de Túlio">
                            <!-- Link para o catálogo, com label acessível -->
                        <img 
                            src="/Netflix/assets/perfil1.jpg" 
                            alt="Esta imagem captura uma figura idosa de plasticina, no estilo stop-motion, com uma expressão melancólica, vestindo uma jaqueta de veludo roxo com bordados complexos em um cenário de biblioteca gótica."
                        >
                        <figcaption>Túlio</figcaption> <!-- Nome do perfil -->
                    </figure>
                </li>
                
                <li>
                    <!-- Item 2: Garcia -->
                    <figure class="profile">
                        <a href="/Netflix/catalogo/catalogo.html" aria-label="Acessar perfil de Garcia">
                            <!-- Link para o catálogo, com label acessível -->
                        <img 
                            src="/Netflix/assets/perfil2.jpg" 
                            alt="Close-up nítido de um boné de beisebol clássico, com coroa cinza e aba azul-marinho bordada com 'ADVENTURE AWAITS', apoiado em madeira rústica pintada de azul sob luz natural suave."
                        >
                        <figcaption>Garcia</figcaption>
                    </figure>
                </li>
                
                <li>
                    <!-- Item 3: Kamila -->
                    <figure class="profile">
                        <a href="/Netflix/catalogo/catalogo.html" aria-label="Acessar perfil de Kamila">
                            <!-- Link para o catálogo, com label acessível -->
                        <img 
                            src="/Netflix/assets/perfil3.jpg" 
                            alt="Uma mulher elegante de cabelo castanho curto, olhando diretamente para a câmera, sobre um fundo verde escuro."
                        >
                        <figcaption>Kamila</figcaption>
                    </figure>
                </li>
                
                <li>
                    <!-- Item 4: Fernanda -->
                    <figure class="profile">
                        <a href="/Netflix/catalogo/catalogo.html" aria-label="Acessar perfil de Fernanda">
                            <!-- Link para o catálogo, com label acessível -->
                        <img 
                            src="/Netflix/assets/perfil4.jpg" 
                            alt="Uma mulher com expressão séria encara a câmera, enquanto uma grande explosão de fogo e destroços ocorre logo atrás dela."
                        >
                        <figcaption>Fernanda</figcaption>
                    </figure>
                </li>
            </ul>
        </section>
    </main>

    <!-- Script JavaScript para funcionalidade de tema -->
    <script src="script.js"></script>
</body>
</html>
