<!DOCTYPE html>
<!-- Define que este é um documento HTML5 -->
<html lang="pt-br">
<!-- Define o idioma da página como português brasileiro -->

<head>
    <!-- Seção de metadados e configurações da página -->
    
    <meta charset="UTF-8">
    <!-- Define a codificação de caracteres como UTF-8 (suporta acentuação) -->
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Configura responsividade: adapta a página para diferentes tamanhos de tela -->
    
    <title>Netflix</title>
    <!-- Define o título que aparece na aba do navegador -->
    
    <link rel="stylesheet" href="style.css">
    <!-- Importa o arquivo CSS externo para estilizar a página -->
</head>

<body>
    <!-- Corpo da página onde todo conteúdo visível é inserido -->
    
    <main>
        <!-- Define a seção principal de conteúdo da página -->
        
        <h1>Quem está assistindo?</h1>
        <!-- Título principal em nível 1 (mais importante para SEO) -->
        
        <section class="profiles" aria-label="Seleção de perfis">
            <!-- Seção semântica que agrupa os perfis com label acessível para leitores de tela -->
            
            <ul class="profiles-list">
                <!-- Lista não ordenada que contém os perfis dos usuários -->
                
                <li>
                    <!-- Item da lista para o primeiro perfil -->
                    
                    <figure class="profile">
                        <!-- Elemento semântico para agrupar imagem e legenda (figura) -->
                        
                        <img 
                            src="/Netflix/assets/perfil1.jpg" 
                            <!-- Caminho para a imagem do primeiro perfil -->
                            
                            alt="Esta imagem captura uma figura idosa de plasticina, no estilo stop-motion, com uma expressão melancólica, vestindo uma jaqueta de veludo roxo com bordados complexos em um cenário de biblioteca gótica."
                            <!-- Texto alternativo descritivo para acessibilidade (leitores de tela) -->
                        >
                        
                        <figcaption>Túlio</figcaption>
                        <!-- Legenda da figura (nome do perfil) -->
                    </figure>
                </li>
                
                <li>
                    <!-- Item da lista para o segundo perfil -->
                    
                    <figure class="profile">
                        <!-- Elemento semântico para agrupar imagem e legenda -->
                        
                        <img 
                            src="/Netflix/assets/perfil2.jpg" 
                            <!-- Caminho para a imagem do segundo perfil -->
                            
                            alt="Close-up nítido de um boné de beisebol clássico, com coroa cinza e aba azul-marinho bordada com 'ADVENTURE AWAITS', apoiado em madeira rústica pintada de azul sob luz natural suave."
                            <!-- Texto alternativo descritivo para acessibilidade -->
                        >
                        
                        <figcaption>Garcia</figcaption>
                        <!-- Legenda da figura (nome do perfil) -->
                    </figure>
                </li>
                
                <li>
                    <!-- Item da lista para o terceiro perfil -->
                    
                    <figure class="profile">
                        <!-- Elemento semântico para agrupar imagem e legenda -->
                        
                        <img 
                            src="/Netflix/assets/perfil3.jpg" 
                            <!-- Caminho para a imagem do terceiro perfil -->
                            
                            alt="Uma mulher elegante de cabelo castanho curto, olhando diretamente para a câmera, sobre um fundo verde escuro."
                            <!-- Texto alternativo descritivo para acessibilidade -->
                        >
                        
                        <figcaption>Kamila</figcaption>
                        <!-- Legenda da figura (nome do perfil) -->
                    </figure>
                </li>
                
                <li>
                    <!-- Item da lista para o quarto perfil -->
                    
                    <figure class="profile">
                        <!-- Elemento semântico para agrupar imagem e legenda -->
                        
                        <img 
                            src="/Netflix/assets/perfil4.jpg" 
                            <!-- Caminho para a imagem do quarto perfil -->
                            
                            alt="Uma mulher com expressão séria encara a câmera, enquanto uma grande explosão de fogo e destroços ocorre logo atrás dela."
                            <!-- Texto alternativo descritivo para acessibilidade -->
                        >
                        
                        <figcaption>Fernanda</figcaption>
                        <!-- Legenda da figura (nome do perfil) -->
                    </figure>
                </li>
            </ul>
        </section>
    </main>
</body>
</html>
